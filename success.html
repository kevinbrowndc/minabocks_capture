<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Minabocks</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(
          rgba(6, 22, 51, 0.82),
          rgba(6, 22, 51, 0.88)
        ),
        url('/images/hero.png');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.96);
      color: #061633;
      max-width: 620px;
      width: 100%;
      border-radius: 24px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      color: #075fe4;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 35px;
    }

    .btn {
      display: inline-block;
      background: #075fe4;
      color: white;
      text-decoration: none;
      padding: 16px 28px;
      border-radius: 10px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn:hover {
      opacity: 0.92;
      transform: translateY(-2px);
    }

    @media (max-width: 700px) {
      .card {
        padding: 36px 24px;
      }

      h1 {
        font-size: 40px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">Minabocks</div>

    <h1>Request Received.</h1>

    <p>
      Thanks for reaching out. We’ll review your request and contact you soon
      about your website and customer follow-up setup.
    </p>

    <a href="/" class="btn">Back to Website</a>
  </div>
</body>
</html>
